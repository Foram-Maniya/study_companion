services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    image: studysphere-frontend:latest
    container_name: studysphere-frontend
    ports:
      - "${HOST_PORT:-8080}:80"
    restart: unless-stopped
